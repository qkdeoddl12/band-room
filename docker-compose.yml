version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: bandroom_db
    environment:
      POSTGRES_DB: bandroom
      POSTGRES_USER: bandroom
      POSTGRES_PASSWORD: bandroom123
      TZ: Asia/Seoul
      PGTZ: Asia/Seoul
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bandroom"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: ./backend
    container_name: bandroom_app
    environment:
      DATABASE_URL: postgresql://bandroom:bandroom123@db:5432/bandroom
      INITIAL_ADMIN_USERNAME: superadmin
      INITIAL_ADMIN_PASSWORD: superadmin1234
      TZ: Asia/Seoul
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./frontend:/app/frontend
      - ./backend/logs:/app/logs

  pgadmin:
    image: dpage/pgadmin4
    container_name: bandroom_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@bandroom.com
      PGADMIN_DEFAULT_PASSWORD: admin1234
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
