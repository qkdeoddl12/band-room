<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Band Room — 합주실 예약</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="logo">
      <span class="logo-icon">🎸</span>
      <span class="logo-text">Band Room</span>
    </div>
    <a href="/admin" class="admin-link">관리자</a>
  </header>

  <main class="main">

    <!-- Date Navigation -->
    <div class="date-nav">
      <div class="date-top">
        <button class="btn-nav" id="prevDay" aria-label="이전 날">&#8249;</button>
        <div class="date-center">
          <span class="date-weekday" id="weekday"></span>
          <span class="date-text" id="currentDate"></span>
        </div>
        <button class="btn-nav" id="nextDay" aria-label="다음 날">&#8250;</button>
      </div>
      <div class="week-strip" id="weekStrip"></div>
    </div>

    <!-- Room Tabs -->
    <div class="room-tabs">
      <button class="room-tab active" id="tab-1" onclick="switchRoom(1)">
        <span class="tab-dot"></span>합주실
      </button>
      <button class="room-tab" id="tab-2" onclick="switchRoom(2)">
        <span class="tab-dot"></span>개인연습실
      </button>
    </div>

    <!-- Timeline -->
    <div class="timeline-section" id="timelineSection">
      <div class="timeline-wrapper">
        <div class="time-labels" id="timeLabels"></div>
        <div class="timeline-grid" id="timelineGrid">
          <!-- slots injected by JS -->
          <div class="reservations-layer" id="reservationsLayer"></div>
          <div class="current-time-line" id="currentTimeLine" style="display:none"></div>
        </div>
      </div>
    </div>

  </main>

  <!-- Bottom Bar -->
  <div class="bottom-bar">
    <button class="btn-reserve-main" onclick="openModal()">
      <span>+</span> 예약하기
    </button>
  </div>

  <!-- Reservation Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h3 class="modal-title">예약하기</h3>
        <button class="modal-close" onclick="closeModal()" aria-label="닫기">✕</button>
      </div>
      <div class="modal-body">
        <form id="reservationForm" autocomplete="off">

          <!-- Room Badge -->
          <div id="roomBadge" class="room-badge r1">
            <span class="badge-dot"></span>
            <span id="roomBadgeName">합주실</span>
          </div>

          <!-- Start Time -->
          <div class="form-group">
            <label class="form-label" for="startTime">시작 시간</label>
            <select class="form-select" id="startTime"></select>
          </div>

          <!-- End Time -->
          <div class="form-group">
            <label class="form-label" for="endTime">종료 시간</label>
            <select class="form-select" id="endTime"></select>
          </div>

          <!-- Time Summary -->
          <div class="time-summary">
            <span class="time-summary-icon">🕐</span>
            <span class="time-summary-text" id="timeSummaryText">—</span>
          </div>

          <!-- Team Name -->
          <div class="form-group">
            <label class="form-label" for="teamName">
              팀명 / 예약자 <span style="color:var(--danger)">*</span>
            </label>
            <input type="text" class="form-input" id="teamName"
              placeholder="팀명 또는 예약자 이름" required>
          </div>

          <!-- Members -->
          <div class="form-group">
            <label class="form-label" for="members">
              참여 멤버
              <span style="color:var(--text-light);font-weight:500;text-transform:none;letter-spacing:0">(선택)</span>
            </label>
            <input type="text" class="form-input" id="members"
              placeholder="홍길동, 김철수, 이영희">
          </div>

          <!-- Note -->
          <div class="form-group">
            <label class="form-label" for="note">
              메모
              <span style="color:var(--text-light);font-weight:500;text-transform:none;letter-spacing:0">(선택)</span>
            </label>
            <textarea class="form-textarea" id="note"
              placeholder="특이사항이 있다면 적어주세요"></textarea>
          </div>

          <!-- Fee & Deposit Info -->
          <div class="fee-box">
            <div class="fee-row">
              <span class="fee-label">이용 요금</span>
              <span class="fee-value" id="feeAmount">—</span>
            </div>
            <div class="fee-breakdown" id="feeBreakdown">시간당 요금 안내</div>
            <div class="fee-divider"></div>
            <div class="fee-deposit-title">입금 계좌</div>
            <div class="fee-deposit">
              <div class="fee-deposit-bank">농협 <b>352-1068-1777-83</b></div>
              <div class="fee-deposit-name">예금주: 황은희</div>
              <button type="button" class="btn-copy-account" id="copyAccountBtn">계좌번호 복사</button>
            </div>
            <div class="fee-notice">입금 확인 후 예약이 확정됩니다.</div>
          </div>

          <button type="submit" class="btn-submit" id="submitBtn">예약 신청</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="/static/app.js"></script>
</body>
</html>
